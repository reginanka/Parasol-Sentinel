name: Daily Forecast

on:
  schedule:
    # Run at 16:00 UTC (19:00 Kyiv time)
    - cron: '7 16 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  daily_forecast:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cron-forecast endpoint
        run: |
          curl -f -X GET "https://${{ secrets.DOMAIN }}/api/cron-forecast" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
