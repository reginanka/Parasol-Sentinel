name: Weather Check

on:
  schedule:
    # Run at 06:02 and 11:02 UTC (09:02 and 14:02 Kyiv time)
    - cron: '2 6,11 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  weather_check:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cron-check endpoint
        run: |
          curl -f -X GET "https://${{ secrets.DOMAIN }}/api/cron-check" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
